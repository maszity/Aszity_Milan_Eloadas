<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ászity Milán, Reketyei Péter" />

    <link rel="stylesheet" href="assets/app.css" />

    <title>Előadás Házi feladat</title>
</head>
<body>
    <header>
        <h1>Web programozás-1 Előadás Házi feladat</h1>
    </header>

    <main class="flex col align-center gap-1 padding-1">
        
        <form class="flex row flex-wrap gap-1 w-fa card padding-1 border-soft box-shadow">

            <input type="search" id="suti-kereso" placeholder="Sütemények keresése...." class="w-fa" />
            <button type="button" id="suti-felvetele-trigger" class="flex w-fc">Sütemény felvétele</button>

        </form>

        <form class="hidden row flex-wrap gap-1 w-fa card padding-1 border-soft box-shadow" id="suti-letrehozas-kontener">

            <input type="text" id="suti-neve" placeholder="Adja meg a sütemény nevét" />
            <input type="text" id="suti-tipusa" placeholder="Adja meg a sütemény típusát" />
            <input type="text" id="suti-ara" placeholder="Adja meg a sütemény árát" />
            <div class="flex row align-center gap-1">
                <label for="suti-dijazott">Díjazott sütemény</label>
                <input type="checkbox" name="suti-dijazott" id="suti-dijazott" value="1" />
            </div>

            <button type="button" id="suti-felvetele" class="flex w-fc">Sütemény felvétele</button>

            <span class="flex align-center pointer ml-auto" id="suti-letrehozas-kontener-bezaras">Bezárás</span>

        </form>

        <form class="hidden row flex-wrap gap-1 w-fa card padding-1 border-soft box-shadow" id="suti-modositas-kontener">

            <input type="text" id="suti-modositas-neve" placeholder="Adja meg a sütemény nevét" />
            <input type="text" id="suti-modositas-tipusa" placeholder="Adja meg a sütemény típusát" />
            <input type="text" id="suti-modositas-ara" placeholder="Adja meg a sütemény árát" />
            <div class="flex row align-center gap-1">
                <label for="suti-modositas-dijazott">Díjazott sütemény</label>
                <input type="checkbox" name="suti-modositas-dijazott" id="suti-modositas-dijazott" value="1" />
            </div>

            <input type="hidden" id="suti-modositas-id" />

            <button type="button" id="suti-modositas-mentes" class="flex w-fc">Sütemény mentése</button>

            <span class="flex align-center pointer ml-auto" id="suti-modositas-kontener-bezaras">Bezárás</span>

        </form>

        <div class="flex row align-center justify-center flex-wrap gap-1" id="sutemeny-kontener">

            Adatok betöltése folyamatban...

        </div>

    </main>

    <footer class="flex row gap-1">
        <span>Ászity Milán - LRBW3B</span>
        <span>Reketyei Péter - P3AG2F</span>
    </footer>

    <script src="assets/js/app.js" type="module"></script>

</body>
</html>
